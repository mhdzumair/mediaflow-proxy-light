name: Release

on:
  release:
    types: [ created ]

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: 1.87.0
  DOCKER_IMAGE: ghcr.io/${{ github.repository }}

permissions:
  contents: write    # Required for creating releases and uploading assets
  packages: write    # Required for pushing to GitHub Container Registry

jobs:
  # ---------------------------------------------------------------------------
  # Desktop / server binaries (Linux, macOS, Windows)
  # ---------------------------------------------------------------------------
  build-binaries:
    name: Desktop · ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: mediaflow-proxy-light
            asset_name: mediaflow-proxy-light-linux-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: mediaflow-proxy-light
            asset_name: mediaflow-proxy-light-linux-aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: mediaflow-proxy-light
            asset_name: mediaflow-proxy-light-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: mediaflow-proxy-light
            asset_name: mediaflow-proxy-light-macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: mediaflow-proxy-light.exe
            asset_name: mediaflow-proxy-light-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Set cross-compilation environment
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build (Unix)
        if: runner.os != 'Windows'
        run: |
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            # Use vendored OpenSSL for ARM64 cross-compilation
            cargo build --release --target ${{ matrix.target }} --features vendored-openssl
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: |
          # Windows builds use vendored OpenSSL to avoid system dependency issues
          cargo build --release --target ${{ matrix.target }} --features vendored-openssl

      - name: Upload binary to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: target/${{ matrix.target }}/release/${{ matrix.artifact_name }}
          asset_name: ${{ matrix.asset_name }}
          tag: ${{ github.ref }}
          overwrite: true

  # ---------------------------------------------------------------------------
  # Android — static binaries for all ABIs, bundled into a tar.gz per ABI
  # Used by the companion Android app which runs the proxy as a subprocess.
  # ---------------------------------------------------------------------------
  build-android:
    name: Android · ${{ matrix.abi }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - abi: arm64-v8a
            target: aarch64-linux-android
          - abi: armeabi-v7a
            target: armv7-linux-androideabi
          - abi: x86_64
            target: x86_64-linux-android
          - abi: x86
            target: i686-linux-android
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: ${{ matrix.target }}

      - name: Set up Android NDK
        id: ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d

      - name: Export ANDROID_NDK_HOME
        run: echo "ANDROID_NDK_HOME=${{ steps.ndk.outputs.ndk-path }}" >> $GITHUB_ENV

      - name: Build for ${{ matrix.abi }}
        run: |
          # Single-target variant of tools/build-android.sh
          API_LEVEL=21
          TOOLCHAIN="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64"
          case "${{ matrix.target }}" in
            aarch64-linux-android)     CC="$TOOLCHAIN/bin/aarch64-linux-android${API_LEVEL}-clang"   AR="$TOOLCHAIN/bin/llvm-ar" ;;
            armv7-linux-androideabi)   CC="$TOOLCHAIN/bin/armv7a-linux-androideabi${API_LEVEL}-clang" AR="$TOOLCHAIN/bin/llvm-ar" ;;
            x86_64-linux-android)      CC="$TOOLCHAIN/bin/x86_64-linux-android${API_LEVEL}-clang"     AR="$TOOLCHAIN/bin/llvm-ar" ;;
            i686-linux-android)        CC="$TOOLCHAIN/bin/i686-linux-android${API_LEVEL}-clang"       AR="$TOOLCHAIN/bin/llvm-ar" ;;
          esac

          TARGET_UPPER="$(echo "${{ matrix.target }}" | tr 'a-z-' 'A-Z_')"
          export "CARGO_TARGET_${TARGET_UPPER}_LINKER=$CC"
          export "CC_${{ matrix.target }}=$CC"
          export "AR_${{ matrix.target }}=$AR"

          cargo build \
            --release \
            --target ${{ matrix.target }} \
            --no-default-features \
            --features "hls,mpd,drm,xtream,extractors,base64-url,vendored-openssl"

          # Strip the resulting binary
          "$TOOLCHAIN/bin/llvm-strip" \
            target/${{ matrix.target }}/release/mediaflow-proxy-light

      - name: Package binary
        run: |
          OUT="mediaflow-proxy-light-android-${{ matrix.abi }}.tar.gz"
          tar -czvf "$OUT" \
            -C target/${{ matrix.target }}/release \
            mediaflow-proxy-light
          echo "ASSET=$OUT" >> $GITHUB_ENV

      - name: Upload Android binary
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ${{ env.ASSET }}
          asset_name: ${{ env.ASSET }}
          tag: ${{ github.ref }}
          overwrite: true

  # ---------------------------------------------------------------------------
  # iOS — .xcframework containing static libs for device + simulator.
  # Used by the companion iOS app which links the proxy as a Rust library via
  # the C FFI (see `include/mediaflow_ffi.h`).
  # ---------------------------------------------------------------------------
  build-ios:
    name: iOS · xcframework
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust + iOS targets
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ios-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build xcframework
        run: ./tools/build-ios.sh

      - name: Archive xcframework
        run: |
          zip -r MediaflowProxy.xcframework.zip MediaflowProxy.xcframework

      - name: Upload xcframework
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: MediaflowProxy.xcframework.zip
          asset_name: mediaflow-proxy-light-ios.xcframework.zip
          tag: ${{ github.ref }}
          overwrite: true

  # ---------------------------------------------------------------------------
  # Docker multi-arch image (uses pre-built Linux binaries from build-binaries)
  # ---------------------------------------------------------------------------
  build-docker:
    name: Docker multi-arch image
    runs-on: ubuntu-latest
    needs: build-binaries
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Extract release version
        id: version
        run: echo "RELEASE_VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build and push (using pre-built binaries)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.prebuilt
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            RELEASE_VERSION=${{ steps.version.outputs.RELEASE_VERSION }}
            BUILDKIT_INLINE_CACHE=1
